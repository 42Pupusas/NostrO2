[workspace]
resolver="2"

members = [
    "nips",
    "nostro2", "nostro2-cache",
    "nostro2-relay", "ring-relay-client",
    "nostro2-signer", "nostro2-benchmarks", "ring-relay-server",
    "ring-relay-nostr",
]

[workspace.dependencies]
# JSON
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"

thiserror = "2.0.16"

# nostro2 = { path = "nostro2" }
nostro2 = { path = "nostro2", version = "0.5.0" }
# nostro2-nips = { path = "nips" }
nostro2-nips = { path = "nips", version = "0.2.0" }

# nostro2-signer = { path = "nostro2-signer" }
# Default uses k256; opt in to secp256k1 with features = ["secp256k1"]
nostro2-signer = { path = "nostro2-signer", version = "0.3.0" }

# nostro2-cache = { path = "nostro2-cache" }
nostro2-cache = { path = "nostro2-cache", version = "0.1.0" }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Cryptography
base64 = "0.22"
cbc = { version = "0.1", features = ["alloc"] }
chacha20 = "0.9"
hex = "0.4.3"
hkdf = "0.12"
hmac = "0.12"
libaes = "0.7"
# k256 = { version = "0.13.4", features = ["schnorr", "ecdh"] }
k256 = { path = "../../forfun/elliptic-curves/k256", features = ["schnorr", "ecdh"] }
secp256k1 = { version = "0.29", features = ["rand", "global-context", "hashes"] }
rand = "0.8"
rand_core = "0.6"
sha2 = "0.10"
zeroize = "1.8"

# Key helpers
bech32 = "0.11"
bip39 = { version = "2.1", features = ["spanish"] }

# Miscellanea utility
futures-util = { version = "0.3", features = ["sink", "std"] }
chrono = "0.4"
tracing-test = "0.2"
lru = "0.12"

# Lock-free ring buffers
quetzalcoatl = "0.8.0"

# Native platform TCP
tokio = { version = "^1.44" }
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-native-roots"] }
rustls = { version = "0.23", features = ["ring", "std", "tls12"], default-features = false }

ring = "^0.17.12" 
tokio-tungstenite-wasm = { version = "0.4.0", features = ["rustls-tls-webpki-roots"] }
wasm-bindgen-futures = "0.4"
wasm-bindgen-test = "0.3"
web-sys = { version = "0.3" }

# Profiling-friendly release build: keep debug info so flamegraphs
# symbolicate without penalizing release perf. Frame pointers are enabled
# via RUSTFLAGS at profile-run time (see scripts in ring-relay-nostr).
[profile.release]
debug = "line-tables-only"

